name: Deploy page
on:
  push:
    branches:
      - main
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: list files
        run: ls -la

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Run Tests
        run: npm run test

      - name: Build project
        run: npm run build

      - name: upload pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public/
     
  deploy:
    needs: build
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pages: write      
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  notify:
    needs: deploy
    if: ${{ always() }}
    runs-on: ubuntu-latest
    steps:
      - name: Notify slack
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          fields: repo,commit,author
          text: "Deployment ${{ needs.deploy.result }} for ${{ github.repository }} by ${{ github.actor }}"
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}